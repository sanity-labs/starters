name: Validate Template

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate Sanity Template
        uses: sanity-io/template-validator@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
