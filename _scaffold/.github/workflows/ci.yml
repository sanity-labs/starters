name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build & Validate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    environment: _scaffold
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: pnpm install
      - name: Format check
        run: pnpm run format:check
      - name: Lint
        run: pnpm run lint
      - name: Typecheck
        run: pnpm run typecheck
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_DATASET }}
      - name: Validate template
        run: pnpm run validate
      - name: Manifest extract
        run: pnpm --filter studio exec sanity manifest extract
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_DATASET }}
      - name: Check function bundle sizes
        run: |
          max_kb=512
          failed=0
          for dir in functions/dist/*/; do
            bundle="$dir/index.js"
            [ -f "$bundle" ] || continue
            size_kb=$(( $(wc -c < "$bundle") / 1024 ))
            name=$(basename "$dir")
            if [ "$size_kb" -gt "$max_kb" ]; then
              echo "::error::$name bundle is ${size_kb} KB (max ${max_kb} KB)"
              failed=1
            else
              echo "$name: ${size_kb} KB ✓"
            fi
          done
          exit $failed
