name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'studio/**'
      - 'packages/l10n/src/**'
      - 'functions/**'
      - 'sanity.blueprint.ts'
      - 'apps/frontend/**'
      - 'apps/translations-dashboard/**'

jobs:
  studio:
    name: Deploy Studio
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter studio run deploy
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_DATASET }}
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}

  blueprint:
    name: Deploy Blueprint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @starter/functions run build
      - name: Deploy blueprints
        uses: sanity-io/blueprints-actions/deploy@deploy-v3
        with:
          sanity-token: ${{ secrets.SANITY_AUTH_TOKEN }}
          stack-id: ${{ vars.SANITY_STACK_ID }}
          project-id: ${{ vars.SANITY_PROJECT_ID }}
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_DATASET }}

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @starter/frontend build
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_DATASET }}

  dashboard:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @starter/translations-dashboard run deploy
        env:
          SANITY_STUDIO_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
          SANITY_STUDIO_DATASET: ${{ vars.SANITY_DATASET }}
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
