name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  agentic-localization:
    name: agentic-localization
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agentic-localization
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: pnpm install
      - name: Format check
        run: pnpm run format:check
      - name: Lint
        run: pnpm run lint
      - name: Typecheck
        run: pnpm run typecheck
      - name: Unit tests
        run: pnpm run test
      - name: Validate template
        run: pnpm run validate
      - name: Manifest extract
        run: pnpm --filter studio exec sanity manifest extract

  ai-shopping-assistant:
    name: ai-shopping-assistant
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-shopping-assistant
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: pnpm install
      - name: Lint app
        run: pnpm --filter app run lint
      - name: Typecheck app
        run: pnpm --filter app run type-check
      - name: Typecheck studio
        run: cd studio && pnpm exec tsc --noEmit
      - name: Validate template
        uses: sanity-io/template-validator@v2
        with:
          directory: ai-shopping-assistant
