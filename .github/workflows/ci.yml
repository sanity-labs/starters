name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  agentic-localization:
    name: agentic-localization
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agentic-localization
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: pnpm install
      - name: Format check
        run: pnpm run format:check
      - name: Lint
        run: pnpm run lint
      - name: Typecheck
        run: pnpm run typecheck
        env:
          # Dummy values — typegen needs a project ID for schema extraction
          # but doesn't make API calls, so any value works
          SANITY_STUDIO_PROJECT_ID: dummy
          SANITY_STUDIO_DATASET: production
      - name: Unit tests
        run: pnpm run test
      - name: Validate template
        run: pnpm run validate
      - name: Manifest extract
        run: pnpm --filter studio exec sanity manifest extract
        env:
          # Same dummy values for manifest extraction
          SANITY_STUDIO_PROJECT_ID: dummy
          SANITY_STUDIO_DATASET: production

  ai-shopping-assistant:
    name: ai-shopping-assistant
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-shopping-assistant
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: pnpm install
      - name: Lint app
        run: pnpm --filter app run lint
      - name: Typecheck app
        run: pnpm --filter app run type-check
      - name: Typecheck studio
        run: cd studio && pnpm exec tsc --noEmit
      - name: Validate template
        run: pnpm dlx sanity-template-validate
